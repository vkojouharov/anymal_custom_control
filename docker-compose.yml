services:
  anymal-control:
    build: .
    image: anymal-custom-control:latest
    container_name: anymal_custom_control
    privileged: true
    network_mode: host
    ipc: host
    environment:
      ROS_MASTER_URI: http://anymal-d181-lpc:11311
      ROS_IP: 192.168.0.231  # IP FOR ANYMAL ETHERNET CONNECTION
      # ROS_IP: 192.168.0.225  # IP FOR ANYMAL WIFI CONNECTION
      PYTHONUNBUFFERED: "1"
      DISPLAY: ${DISPLAY}
    volumes:
      # Mount scripts and source for live editing without rebuild
      - ./catkin_ws/src/anymal_custom_control:/catkin_ws/src/anymal_custom_control:ro
      # X11 socket for GUI display (run `xhost +local:root` on host first)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Host udev database — needed for CANdle USB device detection
      - /run/udev:/run/udev:ro
    stdin_open: true
    tty: true
    devices:
      - /dev/input/js0:/dev/input/js0
      - /dev/ttyACM0:/dev/ttyACM0
      - /dev/bus/usb:/dev/bus/usb
